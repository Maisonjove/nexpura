name: Secret scan

# Second line of defence. The pre-commit hook catches secrets locally;
# this catches anything that landed in the repo because someone skipped
# the hook, cloned without running `scripts/install-git-hooks.sh`, or
# merged from a fork. Fails the build on any real-looking credential.
#
# Scan logic lives in scripts/check-secrets.sh — same code path the
# hook uses, so local + CI verdicts stay in lockstep.

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  workflow_dispatch:

jobs:
  scan:
    name: Scan tracked files
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history so `git ls-files` sees the tree the scanner
          # iterates. The scanner itself only touches working-tree
          # contents — it does not walk history (see SECURITY.md for
          # why that's intentional).
          fetch-depth: 1

      - name: Run secret scanner
        run: bash scripts/check-secrets.sh --all
