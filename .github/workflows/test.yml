name: Unit + integration tests

# Blocks merge on failure. Protects the regression suite for the
# critical + high audit findings (RLS lockdown, webhook idempotency,
# support-access approval, paywall, refund bounds, stage CHECK, etc.)
# so a future refactor can't silently undo them. The secret scanner
# has its own workflow; keep them separate so one red job points
# clearly at the regression that broke.

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  workflow_dispatch:

jobs:
  vitest:
    name: Vitest (unit + integration)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Enable corepack
        run: corepack enable

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm test
