<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 320" width="480" height="320" role="img" aria-label="Bespoke commissions pipeline mockup">
  <rect width="480" height="320" fill="#faf7f2"/>
  <rect x="0.5" y="0.5" width="479" height="319" fill="none" stroke="#e8e1d4"/>

  <!-- Header -->
  <rect x="0" y="0" width="480" height="40" fill="#ffffff"/>
  <line x1="0" y1="40" x2="480" y2="40" stroke="#e8e1d4"/>
  <text x="20" y="25" font-family="Georgia, serif" font-size="13" fill="#1a1a1a">Bespoke Pipeline</text>

  <!-- Stage headers -->
  <g font-family="system-ui, sans-serif" font-size="9" fill="#8a8276" letter-spacing="1.5">
    <text x="50" y="64" text-anchor="middle">BRIEF</text>
    <text x="138" y="64" text-anchor="middle">DESIGN</text>
    <text x="226" y="64" text-anchor="middle">APPROVAL</text>
    <text x="314" y="64" text-anchor="middle">PRODUCTION</text>
    <text x="402" y="64" text-anchor="middle">HANDOVER</text>
  </g>

  <!-- Connector dots/line -->
  <g>
    <circle cx="50" cy="80" r="4" fill="#c9a24a"/>
    <line x1="54" y1="80" x2="134" y2="80" stroke="#c9bfa9" stroke-dasharray="2 3"/>
    <circle cx="138" cy="80" r="4" fill="#c9a24a"/>
    <line x1="142" y1="80" x2="222" y2="80" stroke="#c9bfa9" stroke-dasharray="2 3"/>
    <circle cx="226" cy="80" r="6" fill="#c9a24a" stroke="#a8852c" stroke-width="1.5"/>
    <line x1="232" y1="80" x2="310" y2="80" stroke="#c9bfa9" stroke-dasharray="2 3"/>
    <circle cx="314" cy="80" r="4" fill="none" stroke="#c9bfa9"/>
    <line x1="318" y1="80" x2="398" y2="80" stroke="#c9bfa9" stroke-dasharray="2 3"/>
    <circle cx="402" cy="80" r="4" fill="none" stroke="#c9bfa9"/>
  </g>

  <!-- Highlighted job card (Approval column) -->
  <rect x="172" y="106" width="108" height="172" rx="10" fill="#ffffff" stroke="#c9a24a" stroke-width="1.5"/>
  <rect x="172" y="106" width="108" height="6" rx="3" fill="#c9a24a"/>
  <text x="184" y="132" font-family="system-ui, sans-serif" font-size="9" fill="#8a8276" letter-spacing="1.5">JOB · BSP-0218</text>
  <text x="184" y="152" font-family="Georgia, serif" font-size="13" fill="#1a1a1a">Solitaire</text>
  <text x="184" y="168" font-family="Georgia, serif" font-size="13" fill="#1a1a1a">engagement</text>
  <text x="184" y="184" font-family="Georgia, serif" font-size="13" fill="#1a1a1a">ring</text>
  <text x="184" y="206" font-family="system-ui, sans-serif" font-size="10" fill="#8a8276">Eleanor W.</text>
  <text x="184" y="222" font-family="system-ui, sans-serif" font-size="10" fill="#8a8276">1.2ct centre · 18ct</text>
  <line x1="184" y1="234" x2="268" y2="234" stroke="#f0e9da"/>
  <text x="184" y="250" font-family="system-ui, sans-serif" font-size="9" fill="#8a8276" letter-spacing="1.5">DEPOSIT</text>
  <text x="184" y="266" font-family="Georgia, serif" font-size="12" fill="#1a1a1a">$2,500 / $4,800</text>

  <!-- Other column placeholder cards -->
  <g font-family="system-ui, sans-serif" font-size="10" fill="#5a554c">
    <rect x="20" y="116" width="84" height="48" rx="8" fill="#ffffff" stroke="#e8e1d4"/>
    <text x="28" y="136" font-family="Georgia, serif" font-size="11" fill="#1a1a1a">Earrings</text>
    <text x="28" y="152" fill="#8a8276" font-size="9">D. Pace</text>

    <rect x="20" y="174" width="84" height="48" rx="8" fill="#ffffff" stroke="#e8e1d4"/>
    <text x="28" y="194" font-family="Georgia, serif" font-size="11" fill="#1a1a1a">Pendant</text>
    <text x="28" y="210" fill="#8a8276" font-size="9">M. Romero</text>

    <rect x="108" y="116" width="60" height="48" rx="8" fill="#ffffff" stroke="#e8e1d4"/>
    <text x="116" y="136" font-family="Georgia, serif" font-size="11" fill="#1a1a1a">Bracelet</text>
    <text x="116" y="152" fill="#8a8276" font-size="9">J. Holloway</text>

    <rect x="284" y="116" width="60" height="48" rx="8" fill="#ffffff" stroke="#e8e1d4"/>
    <text x="292" y="136" font-family="Georgia, serif" font-size="11" fill="#1a1a1a">Cuff</text>
    <text x="292" y="152" fill="#8a8276" font-size="9">F. Cromwell</text>

    <rect x="284" y="174" width="60" height="48" rx="8" fill="#ffffff" stroke="#e8e1d4"/>
    <text x="292" y="194" font-family="Georgia, serif" font-size="11" fill="#1a1a1a">Ring</text>
    <text x="292" y="210" fill="#8a8276" font-size="9">R. Sandoval</text>

    <rect x="348" y="116" width="112" height="48" rx="8" fill="#ffffff" stroke="#e8e1d4"/>
    <text x="356" y="136" font-family="Georgia, serif" font-size="11" fill="#1a1a1a">Tennis bracelet</text>
    <text x="356" y="152" fill="#8a8276" font-size="9">S. Marchetti — collection 30 Apr</text>
  </g>

  <!-- Bottom timeline note -->
  <line x1="20" y1="294" x2="460" y2="294" stroke="#f0e9da"/>
  <text x="20" y="312" font-family="system-ui, sans-serif" font-size="10" fill="#8a8276">7 jobs in flight · 2 awaiting client sign-off · 1 ready for handover this week</text>
</svg>
