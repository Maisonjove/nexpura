<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 320" width="480" height="320" role="img" aria-label="Invoicing mockup">
  <rect width="480" height="320" fill="#faf7f2"/>
  <rect x="0.5" y="0.5" width="479" height="319" fill="none" stroke="#e8e1d4"/>

  <!-- Outer doc card -->
  <rect x="20" y="20" width="440" height="280" rx="10" fill="#ffffff" stroke="#e8e1d4"/>

  <!-- Header -->
  <text x="40" y="50" font-family="Georgia, serif" font-size="16" fill="#1a1a1a">Invoice</text>
  <text x="40" y="68" font-family="system-ui, sans-serif" font-size="10" fill="#8a8276">INV-2026-0218 · 18 Apr 2026</text>
  <text x="440" y="50" text-anchor="end" font-family="system-ui, sans-serif" font-size="10" fill="#8a8276" letter-spacing="2">NEXPURA</text>
  <rect x="380" y="58" width="60" height="20" rx="10" fill="#fef3e0" stroke="#e8d2a3"/>
  <text x="410" y="72" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#a8852c">Partial</text>

  <line x1="40" y1="86" x2="440" y2="86" stroke="#f0e9da"/>

  <text x="40" y="106" font-family="system-ui, sans-serif" font-size="9" fill="#8a8276" letter-spacing="2">BILL TO</text>
  <text x="40" y="122" font-family="Georgia, serif" font-size="12" fill="#1a1a1a">Eleanor Whitfield</text>
  <text x="40" y="136" font-family="system-ui, sans-serif" font-size="10" fill="#8a8276">Bespoke job BSP-0218 · solitaire ring</text>

  <text x="240" y="106" font-family="system-ui, sans-serif" font-size="9" fill="#8a8276" letter-spacing="2">DUE</text>
  <text x="240" y="122" font-family="Georgia, serif" font-size="12" fill="#1a1a1a">5 May 2026</text>

  <!-- Line items -->
  <line x1="40" y1="152" x2="440" y2="152" stroke="#e8e1d4"/>
  <text x="40" y="166" font-family="system-ui, sans-serif" font-size="9" fill="#8a8276" letter-spacing="2">DESCRIPTION</text>
  <text x="380" y="166" font-family="system-ui, sans-serif" font-size="9" fill="#8a8276" letter-spacing="2" text-anchor="end">QTY</text>
  <text x="440" y="166" font-family="system-ui, sans-serif" font-size="9" fill="#8a8276" letter-spacing="2" text-anchor="end">AMOUNT</text>

  <g font-family="system-ui, sans-serif" font-size="11" fill="#1a1a1a">
    <text x="40" y="186">1.2ct centre stone — D · VS1</text>
    <text x="380" y="186" text-anchor="end">1</text>
    <text x="440" y="186" text-anchor="end" font-family="Georgia, serif" font-size="12">$3,200</text>

    <text x="40" y="206">18ct white gold setting — bespoke</text>
    <text x="380" y="206" text-anchor="end">1</text>
    <text x="440" y="206" text-anchor="end" font-family="Georgia, serif" font-size="12">$1,400</text>

    <text x="40" y="226">CAD design fee</text>
    <text x="380" y="226" text-anchor="end">1</text>
    <text x="440" y="226" text-anchor="end" font-family="Georgia, serif" font-size="12">$200</text>
  </g>

  <line x1="40" y1="240" x2="440" y2="240" stroke="#f0e9da"/>

  <!-- Totals -->
  <g font-family="system-ui, sans-serif" font-size="11" fill="#5a554c">
    <text x="320" y="258">Subtotal</text>
    <text x="440" y="258" text-anchor="end" fill="#1a1a1a">$4,800</text>
    <text x="320" y="274">Deposit received</text>
    <text x="440" y="274" text-anchor="end" fill="#1a1a1a">−$2,500</text>
  </g>
  <line x1="320" y1="280" x2="440" y2="280" stroke="#e8e1d4"/>
  <text x="320" y="294" font-family="Georgia, serif" font-size="12" fill="#1a1a1a">Balance due</text>
  <text x="440" y="294" font-family="Georgia, serif" font-size="14" fill="#1a1a1a" text-anchor="end">$2,300</text>

  <!-- Status circles strip on left -->
  <g font-family="system-ui, sans-serif" font-size="9" fill="#8a8276">
    <circle cx="48" cy="262" r="3" fill="#c9a24a"/>
    <text x="58" y="265">Deposit paid</text>
    <circle cx="48" cy="278" r="3" fill="none" stroke="#c9bfa9"/>
    <text x="58" y="281">Balance pending</text>
  </g>
</svg>
