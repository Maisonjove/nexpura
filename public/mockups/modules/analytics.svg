<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 320" width="480" height="320" role="img" aria-label="Analytics dashboard mockup">
  <rect width="480" height="320" fill="#faf7f2"/>
  <rect x="0.5" y="0.5" width="479" height="319" fill="none" stroke="#e8e1d4"/>

  <!-- Header -->
  <rect x="0" y="0" width="480" height="40" fill="#ffffff"/>
  <line x1="0" y1="40" x2="480" y2="40" stroke="#e8e1d4"/>
  <text x="20" y="25" font-family="Georgia, serif" font-size="13" fill="#1a1a1a">Analytics</text>
  <text x="460" y="25" font-family="system-ui, sans-serif" font-size="10" fill="#8a8276" text-anchor="end">Last 30 days</text>

  <!-- KPI cards -->
  <g>
    <rect x="20" y="56" width="140" height="60" rx="8" fill="#ffffff" stroke="#e8e1d4"/>
    <text x="32" y="72" font-family="system-ui, sans-serif" font-size="9" fill="#8a8276" letter-spacing="1.8">REVENUE</text>
    <text x="32" y="98" font-family="Georgia, serif" font-size="18" fill="#1a1a1a">$182,400</text>
    <text x="32" y="110" font-family="system-ui, sans-serif" font-size="9" fill="#4a6a3a">+ 12.4% vs prev.</text>

    <rect x="170" y="56" width="140" height="60" rx="8" fill="#ffffff" stroke="#e8e1d4"/>
    <text x="182" y="72" font-family="system-ui, sans-serif" font-size="9" fill="#8a8276" letter-spacing="1.8">JOBS COMPLETED</text>
    <text x="182" y="98" font-family="Georgia, serif" font-size="18" fill="#1a1a1a">87</text>
    <text x="182" y="110" font-family="system-ui, sans-serif" font-size="9" fill="#4a6a3a">+ 6.1% vs prev.</text>

    <rect x="320" y="56" width="140" height="60" rx="8" fill="#ffffff" stroke="#e8e1d4"/>
    <text x="332" y="72" font-family="system-ui, sans-serif" font-size="9" fill="#8a8276" letter-spacing="1.8">AVG. ORDER VALUE</text>
    <text x="332" y="98" font-family="Georgia, serif" font-size="18" fill="#1a1a1a">$2,096</text>
    <text x="332" y="110" font-family="system-ui, sans-serif" font-size="9" fill="#a8521c">− 3.2% vs prev.</text>
  </g>

  <!-- Bar chart card -->
  <rect x="20" y="128" width="440" height="172" rx="10" fill="#ffffff" stroke="#e8e1d4"/>
  <text x="36" y="148" font-family="system-ui, sans-serif" font-size="9" fill="#8a8276" letter-spacing="2">SALES BY CATEGORY</text>

  <!-- Chart bars: vertical -->
  <g>
    <line x1="36" y1="270" x2="444" y2="270" stroke="#e8e1d4"/>

    <!-- Engagement -->
    <rect x="58" y="178" width="36" height="92" fill="#c9a24a"/>
    <text x="76" y="288" font-family="system-ui, sans-serif" font-size="9" fill="#5a554c" text-anchor="middle">Engagement</text>
    <text x="76" y="172" font-family="Georgia, serif" font-size="10" fill="#1a1a1a" text-anchor="middle">$58k</text>

    <!-- Bespoke -->
    <rect x="118" y="196" width="36" height="74" fill="#c9a24a"/>
    <text x="136" y="288" font-family="system-ui, sans-serif" font-size="9" fill="#5a554c" text-anchor="middle">Bespoke</text>
    <text x="136" y="190" font-family="Georgia, serif" font-size="10" fill="#1a1a1a" text-anchor="middle">$42k</text>

    <!-- Earrings -->
    <rect x="178" y="216" width="36" height="54" fill="#c9bfa9"/>
    <text x="196" y="288" font-family="system-ui, sans-serif" font-size="9" fill="#5a554c" text-anchor="middle">Earrings</text>
    <text x="196" y="210" font-family="Georgia, serif" font-size="10" fill="#1a1a1a" text-anchor="middle">$28k</text>

    <!-- Bracelets -->
    <rect x="238" y="222" width="36" height="48" fill="#c9bfa9"/>
    <text x="256" y="288" font-family="system-ui, sans-serif" font-size="9" fill="#5a554c" text-anchor="middle">Bracelets</text>
    <text x="256" y="216" font-family="Georgia, serif" font-size="10" fill="#1a1a1a" text-anchor="middle">$22k</text>

    <!-- Repairs -->
    <rect x="298" y="234" width="36" height="36" fill="#c9bfa9"/>
    <text x="316" y="288" font-family="system-ui, sans-serif" font-size="9" fill="#5a554c" text-anchor="middle">Repairs</text>
    <text x="316" y="228" font-family="Georgia, serif" font-size="10" fill="#1a1a1a" text-anchor="middle">$18k</text>

    <!-- Pendants -->
    <rect x="358" y="240" width="36" height="30" fill="#e2d6ba"/>
    <text x="376" y="288" font-family="system-ui, sans-serif" font-size="9" fill="#5a554c" text-anchor="middle">Pendants</text>
    <text x="376" y="234" font-family="Georgia, serif" font-size="10" fill="#1a1a1a" text-anchor="middle">$14k</text>
  </g>

  <text x="444" y="148" font-family="system-ui, sans-serif" font-size="9" fill="#8a8276" letter-spacing="2" text-anchor="end">$ THOUSANDS</text>
</svg>
