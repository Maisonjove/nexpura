<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="630" fill="#1c1917"/>
  <rect x="0" y="0" width="1200" height="630" fill="url(#grad)"/>
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1c1917;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#292524;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Decorative gem shape -->
  <polygon points="600,120 660,200 600,280 540,200" fill="none" stroke="#b45309" stroke-width="2" opacity="0.6"/>
  <polygon points="600,150 640,200 600,250 560,200" fill="#b45309" opacity="0.2"/>
  <!-- Logo text -->
  <text x="600" y="340" font-family="Georgia, serif" font-size="72" font-weight="600" fill="#fafaf9" text-anchor="middle" letter-spacing="-1">Nexpura</text>
  <!-- Tagline -->
  <text x="600" y="400" font-family="Georgia, serif" font-size="28" fill="#a8a29e" text-anchor="middle">The Operating System for Modern Jewellers</text>
  <!-- Feature pills -->
  <rect x="260" y="460" width="100" height="36" rx="18" fill="#292524" stroke="#44403c" stroke-width="1"/>
  <text x="310" y="483" font-family="sans-serif" font-size="14" fill="#d6d3d1" text-anchor="middle">POS</text>
  <rect x="380" y="460" width="120" height="36" rx="18" fill="#292524" stroke="#44403c" stroke-width="1"/>
  <text x="440" y="483" font-family="sans-serif" font-size="14" fill="#d6d3d1" text-anchor="middle">Repairs</text>
  <rect x="520" y="460" width="160" height="36" rx="18" fill="#292524" stroke="#44403c" stroke-width="1"/>
  <text x="600" y="483" font-family="sans-serif" font-size="14" fill="#d6d3d1" text-anchor="middle">Inventory</text>
  <rect x="700" y="460" width="130" height="36" rx="18" fill="#292524" stroke="#44403c" stroke-width="1"/>
  <text x="765" y="483" font-family="sans-serif" font-size="14" fill="#d6d3d1" text-anchor="middle">Bespoke</text>
  <rect x="850" y="460" width="120" height="36" rx="18" fill="#292524" stroke="#44403c" stroke-width="1"/>
  <text x="910" y="483" font-family="sans-serif" font-size="14" fill="#d6d3d1" text-anchor="middle">CRM</text>
  <!-- Bottom amber accent line -->
  <rect x="480" y="560" width="240" height="3" rx="2" fill="#b45309" opacity="0.8"/>
</svg>
