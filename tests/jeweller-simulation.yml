config:
  target: "https://nexpura.com"
  phases:
    # Warm up - 50 users
    - duration: 60
      arrivalRate: 10
      rampTo: 50
      name: "Warm up - ramp to 50 users"
    # Ramp to 200
    - duration: 90
      arrivalRate: 50
      rampTo: 200
      name: "Ramp up to 200"
    # Ramp to 500
    - duration: 120
      arrivalRate: 200
      rampTo: 500
      name: "Ramp up to 500"
    # Peak load 1000
    - duration: 180
      arrivalRate: 500
      rampTo: 1000
      name: "Peak load - 1000 users"
    # Sustained 1000
    - duration: 300
      arrivalRate: 1000
      name: "Sustained 1000 users"
    # Ramp down
    - duration: 60
      arrivalRate: 1000
      rampTo: 100
      name: "Ramp down"

  defaults:
    headers:
      User-Agent: "NexpuraLoadTest/1.0 (JewellerSimulation)"
      Accept: "text/html,application/xhtml+xml,application/xml;q=0.9,*/*;q=0.8"
      Accept-Language: "en-AU,en;q=0.5"
      Connection: "keep-alive"

  # Cookie jar to hold session cookies per virtual user
  http:
    timeout: 30
    pool: 100

scenarios:
  # ============================================================
  # PUBLIC PAGES (unauthenticated) - 20% weight
  # Simulates potential new customers / staff login pages
  # ============================================================

  - name: "New User - Browse Marketing Pages"
    weight: 5
    flow:
      - get:
          url: "/"
          name: "Homepage"
      - think: 2
      - get:
          url: "/pricing"
          name: "Pricing Page"
      - think: 3
      - get:
          url: "/features"
          name: "Features Page"
      - think: 2
      - get:
          url: "/contact"
          name: "Contact Page"

  - name: "Staff Login Flow"
    weight: 5
    flow:
      - get:
          url: "/"
          name: "Homepage"
      - think: 1
      - get:
          url: "/login"
          name: "Login Page"
      - think: 3
      - get:
          url: "/login"
          name: "Login Page Return"

  - name: "Demo User Experience"
    weight: 5
    flow:
      - get:
          url: "/demo"
          name: "Demo Page"
      - think: 2
      - get:
          url: "/pricing"
          name: "Pricing from Demo"

  - name: "Public Health Check"
    weight: 5
    flow:
      - get:
          url: "/api/health/concurrency"
          name: "Concurrency Health"

  # ============================================================
  # AUTHENTICATED FLOWS - Using Demo Session
  # All flows start by obtaining a demo session cookie
  # ============================================================

  # STORE OWNER (20% of authenticated users)
